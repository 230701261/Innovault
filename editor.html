<!DOCTYPE html>
<html>
<head>
<title>AI Writing</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">InnoVault</div>
</div>

<div class="container">

<h1>AI Writing Assistant</h1>

<div class="editor">

<textarea id="text">
Climate change is one of the most visible issues today. Extreme weather events are increasing rapidly...
</textarea>

<div class="sidebar">
    <h3>Suggestions</h3>
    <p><b>Word Choice:</b> Replace "more" with "increasingly"</p>
    <button>Accept</button>
    <button>Reject</button>

    <h4>Rephrase</h4>
    <p>Climate change effects are rapidly increasing...</p>
</div>

</div>

</div>

</body>
</html>
